name: release-pr-checks

on:
  pull_request:
    branches:
      - master
    types:
      - opened
      - synchronize
      - reopened
      - edited

permissions:
  contents: read

jobs:
  validate-release-pr:
    if: startsWith(github.head_ref, 'release/deploy_')
    runs-on: ubuntu-latest

    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate branch naming
        run: |
          BRANCH="${{ github.head_ref }}"
          echo "Validating branch: ${BRANCH}"

          if ! echo "${BRANCH}" | grep -Eq '^release/deploy_[0-9]{4}_[0-9]{2}_[0-9]{2}_[0-9]+$'; then
            echo "Invalid release branch format"
            exit 1
          fi

      - name: Ensure required files exist
        run: |
          test -f CHANGELOG.md
          test -f README.md

      - name: Ensure README markers exist
        run: |
          grep -q '<!-- RELEASE_START -->' README.md
          grep -q '<!-- RELEASE_END -->' README.md

      - name: Ensure changelog was updated
        run: |
          grep -q '^## ' CHANGELOG.md

      - name: Basic repository validation
        run: |
          echo "Add your real build/test steps here"
          echo "Validation passed"
