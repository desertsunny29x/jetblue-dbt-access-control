name: sync-master-back-to-develop

on:
  workflow_run:
    workflows: ["sync-release-pr"]
    types:
      - completed

permissions:
  contents: write
  pull-requests: write

jobs:
  sync:
    if: github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Sync master → develop
        run: |
          git fetch origin
          git checkout develop
          git pull origin develop

          BRANCH="sync/master_to_develop_$(date +%s)"
          git checkout -b $BRANCH

          git merge origin/master || exit 1

          git push origin $BRANCH

      - name: Create PR
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr create \
            --base develop \
            --head $BRANCH \
            --title "Sync master → develop" \
            --body "Automated sync"

      - name: Enable auto merge
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR=$(gh pr list --head $BRANCH --json number --jq '.[0].number')
          gh pr merge $PR --auto --merge --delete-branch || true
