name: sync-master-back-to-develop

on:
  workflow_run:
    workflows: ["sync-release-pr"]
    types:
      - completed
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: sync-master-back-to-develop
  cancel-in-progress: false

jobs:
  sync:
    if: github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Fetch latest branches
        run: |
          git fetch origin --prune
          git checkout develop
          git pull origin develop
          git checkout master
          git pull origin master

      - name: Create sync branch name
        id: sync_branch
        run: |
          BRANCH="sync/master_to_develop_$(date -u +%Y_%m_%d_%H%M%S)"
          echo "branch=$BRANCH" >> "$GITHUB_OUTPUT"
          echo "Using sync branch: $BRANCH"

      - name: Create sync branch from develop
        run: |
          git checkout develop
          git checkout -b "${{ steps.sync_branch.outputs.branch }}"

      - name: Merge master into sync branch
        id: merge_step
        run: |
          git merge --no-edit origin/master || {
            echo "Merge conflict while syncing master back into develop."
            exit 1
          }

      - name: Check whether anything changed
        id: diff_check
        run: |
          if git diff --quiet origin/develop...HEAD; then
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
            echo "No commits to sync from master into develop."
          else
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Push sync branch
        if: steps.diff_check.outputs.has_changes == 'true'
        run: |
          git push -u origin "${{ steps.sync_branch.outputs.branch }}"

      - name: Check for existing sync PR
        if: steps.diff_check.outputs.has_changes == 'true'
        id: existing_pr
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR_NUMBER=$(gh pr list \
            --base develop \
            --head "${{ steps.sync_branch.outputs.branch }}" \
            --state open \
            --json number \
            --jq '.[0].number')

          if [ -n "$PR_NUMBER" ] && [ "$PR_NUMBER" != "null" ]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "number=$PR_NUMBER" >> "$GITHUB_OUTPUT"
            echo "Sync PR already exists: #$PR_NUMBER"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create sync PR
        if: steps.diff_check.outputs.has_changes == 'true' && steps.existing_pr.outputs.exists == 'false'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr create \
            --base develop \
            --head "${{ steps.sync_branch.outputs.branch }}" \
            --title "Sync master back to develop" \
            --body "Automated PR to sync release documentation and release metadata from master back into develop."

      - name: Get sync PR number
        if: steps.diff_check.outputs.has_changes == 'true'
        id: pr_number
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR_NUMBER=$(gh pr list \
            --base develop \
            --head "${{ steps.sync_branch.outputs.branch }}" \
            --state open \
            --json number \
            --jq '.[0].number')

          if [ -z "$PR_NUMBER" ] || [ "$PR_NUMBER" = "null" ]; then
            echo "No sync PR found."
            exit 1
          fi

          echo "number=$PR_NUMBER" >> "$GITHUB_OUTPUT"
          echo "Sync PR number: $PR_NUMBER"

      - name: Enable auto merge
        if: steps.diff_check.outputs.has_changes == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr merge "${{ steps.pr_number.outputs.number }}" --auto --merge --delete-branch || true

      - name: Skip when nothing changed
        if: steps.diff_check.outputs.has_changes == 'false'
        run: |
          echo "Nothing to sync. Skipping PR creation."
