name: publish-release

on:
  pull_request_target:
    branches:
      - master
    types:
      - closed
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: read

concurrency:
  group: publish-release
  cancel-in-progress: false

jobs:
  publish-release:
    if: >
      github.event_name == 'workflow_dispatch' ||
      (
        github.event.pull_request.merged == true &&
        github.event.pull_request.base.ref == 'master' &&
        startsWith(github.event.pull_request.head.ref, 'release/deploy_')
      )
    runs-on: ubuntu-latest

    steps:
      - name: Print event details
        run: |
          echo "event_name=${{ github.event_name }}"
          echo "default_branch=${{ github.event.repository.default_branch }}"
          echo "base_ref=${{ github.event.pull_request.base.ref }}"
          echo "head_ref=${{ github.event.pull_request.head.ref }}"
          echo "merged=${{ github.event.pull_request.merged }}"

      - name: Checkout master
        uses: actions/checkout@v4
        with:
          ref: master
          fetch-depth: 0

      - name: Setup Git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Determine release branch and title
        id: release_pr
        run: |
          if [ "${{ github.event_name }}" = "pull_request_target" ]; then
            echo "head_ref=${{ github.event.pull_request.head.ref }}" >> "$GITHUB_OUTPUT"
            echo "title=${{ github.event.pull_request.title }}" >> "$GITHUB_OUTPUT"
          else
            echo "Manual workflow_dispatch fallback is not fully automated."
            exit 1
          fi

      - name: Derive tag from release branch
        id: tag
        run: |
          BRANCH="${{ steps.release_pr.outputs.head_ref }}"
          TAG=$(echo "$BRANCH" | sed 's#^release/deploy_#v#')
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "Using tag: $TAG"

      - name: Check if tag already exists
        id: tag_check
        run: |
          git fetch --tags
          if git rev-parse "${{ steps.tag.outputs.tag }}" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create git tag
        if: steps.tag_check.outputs.exists == 'false'
        run: |
          git tag "${{ steps.tag.outputs.tag }}"
          git push origin "${{ steps.tag.outputs.tag }}"

      - name: Build release notes
        run: |
          cat > release_notes.md <<EOF
          ## Automated Production Release

          - Release Tag: \`${{ steps.tag.outputs.tag }}\`
          - Release PR Title: \`${{ steps.release_pr.outputs.title }}\`
          - Release Branch: \`${{ steps.release_pr.outputs.head_ref }}\`
          - Target Branch: \`master\`

          This release was published automatically after the release PR was merged into \`master\`.
          EOF

      - name: Create GitHub Release
        if: steps.tag_check.outputs.exists == 'false'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ steps.tag.outputs.tag }}" \
            --title "Release ${{ steps.tag.outputs.tag }}" \
            --notes-file release_notes.md \
            --generate-notes
