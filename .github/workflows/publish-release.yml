name: publish-release

on:
  workflow_run:
    workflows: ["sync-release-pr"]
    types:
      - completed

permissions:
  contents: write
  pull-requests: read

jobs:
  publish-release:
    if: >
      github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout master
        uses: actions/checkout@v4
        with:
          ref: master
          fetch-depth: 0

      - name: Setup Git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Find latest merged release PR
        id: pr
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR_JSON=$(gh pr list \
            --base master \
            --state merged \
            --limit 10 \
            --json number,title,headRefName,mergedAt \
            --jq '[.[] | select(.headRefName | startswith("release/deploy_"))] | sort_by(.mergedAt) | last')

          if [ -z "$PR_JSON" ] || [ "$PR_JSON" = "null" ]; then
            echo "No release PR found"
            exit 1
          fi

          HEAD=$(echo "$PR_JSON" | jq -r '.headRefName')
          TITLE=$(echo "$PR_JSON" | jq -r '.title')

          echo "branch=$HEAD" >> $GITHUB_OUTPUT
          echo "title=$TITLE" >> $GITHUB_OUTPUT

      - name: Generate tag
        id: tag
        run: |
          TAG=$(echo "${{ steps.pr.outputs.branch }}" | sed 's#^release/deploy_#v#')
          echo "tag=$TAG" >> $GITHUB_OUTPUT

      - name: Create tag
        run: |
          git tag "${{ steps.tag.outputs.tag }}"
          git push origin "${{ steps.tag.outputs.tag }}" || true

      - name: Create Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ steps.tag.outputs.tag }}" \
            --title "Release ${{ steps.tag.outputs.tag }}" \
            --generate-notes
